name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --linux --publish never

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    env:
      # Skip code signing — we ship unsigned macOS builds. Users will need
      # to right-click → Open the first time, and the auto-updater is
      # effectively disabled until we add Apple Developer ID signing.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --publish never

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
