name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate every release build on the test suite. The v0.4.1 → v0.4.2
  # regression (a TDZ ReferenceError that crashed the main process at
  # boot, presenting as a blank sidebar in the wild) would have been
  # caught here by tests/integration/ipc-handlers-boot.test.ts, which
  # runs registerIpcHandlers() with stubbed electron and asserts the
  # full surface registers without throwing. If `verify` fails, no
  # platform builds run, no artifacts upload, no release publishes.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pnpm install
      # Type-check via the project references *before* tests. Catches the
      # whole class of "renamed a field" / "JSX namespace" / "discriminated
      # union" bugs that vitest can't see (it runs the bundler, not tsc).
      # Cheap to gate on — adds ~3 s on a warm cache.
      - run: pnpm exec tsc -b
      - run: pnpm test

  build-linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # node-gyp 9.x (used by node-pty 1.1.0) imports distutils, which Python
      # removed in 3.12 — runners default to 3.12+ and the build fails. Pin
      # to 3.11 across all jobs so node-pty's native build succeeds.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --linux --publish never

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v3
        with:
          # Tags like v0.3.0-alpha.1 / v0.3.0-rc.1 → GitHub prerelease, which
          # keeps electron-updater (releaseType: 'release') from offering it
          # to users on the stable channel.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install

      - name: Build
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --publish never

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
